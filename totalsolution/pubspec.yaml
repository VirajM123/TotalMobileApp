name: totalsolution
description: "Distributor-Salesman Order Management System"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # Added for mobile preview
  device_preview: ^1.2.0
  qr_flutter: ^4.1.0
  
  
  # Firebase dependencies (uncomment when ready to deploy)
  # firebase_core: ^2.24.0
  # firebase_auth: ^4.16.0
  # cloud_firestore: ^4.14.0
  
  # For local storage
  shared_preferences: ^2.2.2
  
  # Premium UI & Charts
  fl_chart: ^0.69.0
  google_fonts: ^6.2.1
  percent_indicator: ^4.2.3
  
  # For file picking (CSV/Excel import)
  file_picker: ^6.1.1
  csv: ^6.0.0
  
  # For PDF generation and sharing
  pdf: ^3.10.8
  share_plus: ^7.2.2
  printing: ^5.12.0
  path_provider: ^2.1.2
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/TotalSolution.png

